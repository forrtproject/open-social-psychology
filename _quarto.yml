    - chapter20.qmd #Hot Coffee Effect
    - references.qmd
    - glossary.qmd
    - summary.qmd

bibliography: references.bib
csl: apa.csl
 
format:
  html:
    theme: lux
  pdf:
    documentclass: book
    keep-tex: true
    output-file: pdf-book
    link-citations: true
    link-bibliography: true
    linkcolor: green
    citecolor: green
    header-includes:
      - \usepackage{fancyhdr}
      - \usepackage{graphicx}
      - \usepackage{eso-pic}
      - \usepackage{tikz}
      - \AtBeginDocument{\thispagestyle{empty}\begin{tikzpicture}[remember picture,overlay]
              \node at (current page.center) [yshift=1cm] {\includegraphics[width=0.75\paperwidth,height=0.9\paperheight,keepaspectratio]{resources/cover.png}};
              \end{tikzpicture}\clearpage}
  epub: 
    cover-image: cover.png

editor: source

comments:
  hypothesis: true
  
callout-appearance: simple
callout-icon: false
