  date: 2026-05-27
  downloads: [pdf, epub]
  page-footer: 
    left: |
      Open Social Psychology
    right: |
      Edited by Rima-Maria Rahal
  sidebar:
    search: true
    logo: resources/logo.png
    tools:
      - icon: github
        menu:
          - text: Source Code
            href:  https://github.com/rimamrahal/OpenSocialPsychology
          - text: Report a Bug
            href:  https://github.com/rimamrahal/OpenSocialPsychology/issues
  chapters:
    - index.qmd
    - howthisbook.qmd
    - howto.qmd
    - intro.qmd
    - science.qmd
    - part1.qmd
    - chapter2.qmd #Pygmalion Effect
    - chapter3.qmd #Cognitive Dissonance
    - chapter15.qmd #Implicit association Test and Attitudes
    - chapter5.qmd #Ego Depletion
    - chapter6.qmd #Feeling the Future
    - part2.qmd
    - chapter21.qmd #Conformity
    - chapter4.qmd #Obedience to Authority
    - chapter7.qmd #Social Loafing (Ringelmann Effect)
